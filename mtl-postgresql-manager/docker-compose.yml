services:
  postgres:
    image: postgres:18-alpine
    container_name: mtl-postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-7000}:5432"
    networks:
      - mtl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtl-manager-postgresql
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/mtl-manager.db}
      POSTGRES_HOST: ${POSTGRES_HOST:-mtl-postgresql}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_secret}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:7001}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_this_password}
    volumes:
      - ./data/sqlite:/data
      - ./backups:/backups
    ports:
      - "${MANAGER_EXTERNAL_PORT:-7001}:3000"
    networks:
      - mtl-network
    restart: unless-stopped
    user: root
    command: >
      sh -c "
        chmod -R 777 /data 2>/dev/null || true &&
        if [ ! -f /data/mtl-manager.db ]; then
          echo 'Initializing database...'
          npx prisma db push
          node scripts/seed.js
        fi &&
        chown -R nextjs:nodejs /data
        exec node server.js
      "

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mtl-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-change_this_password}
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    ports:
      - "${PGADMIN_EXTERNAL_PORT:-7002}:80"
    networks:
      - mtl-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  mtl-network:
    driver: bridge
